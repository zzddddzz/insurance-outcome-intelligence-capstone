<style>
  html, body, #root { height: 100%; }
  body { overflow: hidden; }

  /* Canvas full-bleed */
  #root { background: var(--bg-page); }

  /* Make every artboard interior fill */
  .ab-fill { width: 100%; height: 100%; }

  /* mobile artboard background */
  .mobile-frame {
    width: 100%; height: 100%;
    background: var(--bg-page);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }

  /* state artboards inherit shell padding */
  .state-frame {
    width: 100%; height: 100%;
    background: var(--bg-page);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .state-frame .topbar { flex: 0 0 auto; }
  .state-frame .state-body { flex: 1; overflow-y: auto; min-height: 0; }
</style>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState: useStateApp } = React;

// Wrappers for canvas artboards. Each artboard frame is a fixed pixel size;
// the inner Streamlit app fills it.

const ExecArtboard = ({ withDrawer, initialSelected, compact }) => (
  <div className={`ab-fill ${compact ? 'ab-compact' : ''}`}>
    <ExecDashboard withDrawer={withDrawer} initialSelected={initialSelected} compact={compact} />
  </div>
);

const StateArtboard = ({ kind }) => (
  <div className="state-frame">
    <Topbar />
    <div className="state-body">
      {kind === 'loading' && <StateLoading />}
      {kind === 'empty'   && <StateEmpty />}
      {kind === 'error'   && <StateError />}
    </div>
  </div>
);

const MobileArtboard = () => (
  <div className="mobile-frame">
    <MobileView />
  </div>
);

// Method-only artboard (focused view of section 3)
const MethodArtboard = () => (
  <div className="state-frame">
    <Topbar />
    <div className="state-body" style={{ padding: 14 }}>
      <div style={{ marginBottom: 12 }}>
        <span className="h-eyebrow">Method &amp; evidence</span>
        <h1 className="h-section" style={{ marginTop: 4 }}>How the Action Console decides</h1>
        <p style={{ fontSize: 13, color: 'var(--ink-3)', maxWidth: 760, marginTop: 6 }}>
          A compact, auditable view of data coverage, model inputs, performance, and what the board should not over-interpret.
        </p>
      </div>
      <MethodView />
    </div>
  </div>
);

// ─────────────────────────────────────────────────────────────
// Canvas
// ─────────────────────────────────────────────────────────────
const App = () => (
  <DesignCanvas title="Portfolio Action Console" subtitle="MSDS 498 · Team 54 · capstone hi-fi prototype">
    <DCSection id="dash" title="1 · Executive dashboard" subtitle="First screen on load.">
      <DCArtboard id="dash-pane" label="Review pane · fits 600px preview" width={400} height={1180}>
        <ReviewPane />
      </DCArtboard>
      <DCArtboard id="dash-review" label="Tablet · 1100×1040" width={1100} height={1040}>
        <ExecArtboard withDrawer={false} initialSelected="S-014" compact={true} />
      </DCArtboard>
      <DCArtboard id="dash-with-drawer" label="Full desktop + drawer" width={1640} height={1100}>
        <ExecArtboard withDrawer={true} initialSelected="S-014" />
      </DCArtboard>
      <DCArtboard id="dash-wide" label="Full desktop, no drawer" width={1480} height={1100}>
        <ExecArtboard withDrawer={false} initialSelected="S-014" />
      </DCArtboard>
    </DCSection>

    <DCSection id="detail" title="2 · Segment detail drawer" subtitle="Three action recommendations side-by-side.">
      <DCArtboard id="detail-reprice" label="S-014 · Reprice" width={520} height={980}>
        <div style={{ width: '100%', height: '100%', background: '#fff' }}>
          <Drawer seg={SEGMENTS.find(s => s.id === 'S-014')} onClose={() => {}} />
        </div>
      </DCArtboard>
      <DCArtboard id="detail-retain" label="S-052 · Retain" width={520} height={980}>
        <div style={{ width: '100%', height: '100%', background: '#fff' }}>
          <Drawer seg={SEGMENTS.find(s => s.id === 'S-052')} onClose={() => {}} />
        </div>
      </DCArtboard>
      <DCArtboard id="detail-review" label="S-063 · Review" width={520} height={980}>
        <div style={{ width: '100%', height: '100%', background: '#fff' }}>
          <Drawer seg={SEGMENTS.find(s => s.id === 'S-063')} onClose={() => {}} />
        </div>
      </DCArtboard>
    </DCSection>

    <DCSection id="method" title="3 · Method &amp; evidence" subtitle="Coverage, model inputs, calibration, limits.">
      <DCArtboard id="method-page" label="Method page" width={1480} height={780}>
        <MethodArtboard />
      </DCArtboard>
    </DCSection>

    <DCSection id="mobile" title="4 · Narrow viewport" subtitle="Phone width — chip filters, ranked cards, sticky summary.">
      <DCArtboard id="mobile-list" label="Ranked cards · sticky summary" width={390} height={780}>
        <MobileArtboard />
      </DCArtboard>
    </DCSection>

    <DCSection id="states" title="5 · Loading, empty, degraded" subtitle="Skeleton, over-filtered, and feed-down.">
      <DCArtboard id="state-loading" label="Loading · skeleton" width={1100} height={780}>
        <StateArtboard kind="loading" />
      </DCArtboard>
      <DCArtboard id="state-empty" label="Empty · over-filtered" width={1100} height={780}>
        <StateArtboard kind="empty" />
      </DCArtboard>
      <DCArtboard id="state-error" label="Degraded · feed down" width={1100} height={780}>
        <StateArtboard kind="error" />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
